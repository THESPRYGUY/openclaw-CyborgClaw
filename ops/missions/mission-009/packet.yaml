successCriteria:
  - One Alpha parent seat reaches acknowledged and in_progress
  - One bounded child unit appears live under that parent seat
  - Parent-child lineage is visible on mission room, roster wall, and canonical card
  - Parent accepts child proof explicitly
  - Workforce job advances beyond dispatched
  - Publish bundle exists
  - Job archives and seals cleanly
  - MVP ticker reassessment is evidence-based

failureCriteria:
  - Child work happens but remains off-surface
  - Parent cannot accept or reject child output explicitly
  - Job stays at dispatched after accepted child proof
  - Any surface implies hidden authority or peer-seat child promotion
  - Publish or seal requires manual truth stitching
