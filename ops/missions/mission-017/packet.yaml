instructions:
  leadInstructions:
    - Run the mission as a bounded recursive hardening packet, not a cleanup sprint.
    - Keep each BRRR lap focused on one telemetry seam at a time.
    - Require one explicit source-precedence hypothesis before each mutation pass.
    - Require one live-vs-board comparison receipt before each refine/repeat decision.
    - Do not admit Part 2 until the board is SSOT-ready by proof.
  downstreamInstructions:
