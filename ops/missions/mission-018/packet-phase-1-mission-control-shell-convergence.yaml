  agentsToBeSpawned: []

instructions:
  leadInstructions:
    - Treat Mission Control as a foyer / router, not a new mission authority.
    - Keep the slice strictly visual and routing-level unless a backing truth seam already exists.
    - Preserve operator trust by refusing to relabel evidence inventory as in-flight mission truth.
    - Prefer shared renderer extraction over duplicated launcher markup.
  downstreamInstructions:
    - target: voltaris-v2
      instructions:
        - Keep the operator read mission-first and blunt.
        - Reject placeholder labels that pretend to be live models.
        - Keep lawful `held` posture distinct from generic warning language.
    - target: codex
      instructions:
        - Ground the slice in the current dashboard seams and avoid cross-page drift.
        - Extract the launcher as a reusable renderer with explicit `disabled` and route-derived `current` state.
        - Keep the existing evidence rail intact below the new Mission Control shell.

