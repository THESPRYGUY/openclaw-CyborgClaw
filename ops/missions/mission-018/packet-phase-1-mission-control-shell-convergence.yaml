objective:
  short: Converge `/live-dev-feed` into the Mission Control foyer shell.
  detail: >
    Phase 1 of Mission 018 is a bounded shell-convergence slice. It renames the
    Live Dev Feed hero to `Mission Control`, installs a six-button mission
    launcher using the Agent Control foyer visual grammar, preserves the current
    evidence body as a supporting rail, and avoids any fake claim that the route
    already represents a true in-flight mission feed.

dependencyGate:
  blockedBy:
    - MISSION-017
  detail: >
    Mission 018 remains queued behind Mission 017 SSOT closeout. This packet is
    scoped so it can be prepared now, but execution must not widen into semantic
    Golden Run re-authoring before Mission 017 is closed.

scope:
  inScope:
    - Mission Control hero rename for `/live-dev-feed`
    - six-button launcher shell
    - shared launcher renderer extraction
    - Mission Control-specific launcher contract
    - explicit reserved placeholders for buttons 4-6
    - preserving the existing evidence inventory as the Phase 1 supporting rail
  outOfScope:
    - replacing the evidence rail with a true in-flight mission feed
    - Golden Run source-precedence changes
    - new lifecycle authority or mission-state engine
    - admission of future buttons 4-6 as real models
    - broad redesign of adjacent operator surfaces

