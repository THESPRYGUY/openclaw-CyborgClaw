successCriteria:
  - `/live-dev-feed` renders a Mission Control hero instead of a plain Live Dev Feed top card
  - the six-button launcher renders in canonical order
  - the launcher contract is shared rather than duplicated page-local markup
  - Reserved 04-06 are visibly reserved and do not imply live backing models
  - the current evidence inventory remains available as supporting rail truth
  - no copy on the page falsely claims that the route already shows only in-flight jobs

failureCriteria:
  - the slice introduces a second mission-lifecycle authority
  - the page claims `in-flight only` without a real backing data contract
  - the launcher is copy-pasted and drifts from the shared renderer seam
  - placeholder buttons look active or semantically admitted
  - the packet widens into Golden Run semantic redesign or adjacent board cleanup
