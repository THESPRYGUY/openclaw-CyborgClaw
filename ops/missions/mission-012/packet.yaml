  seededCandidatePath: ops/missions/mission-011/spec.md

successCriteria:
  - Agent RSI becomes the documented entrypoint for the improvement engine
  - The engine contract is bounded and Golden-Flow-native
  - Idle mode is clearly limited to inspect, score, draft, and queue
  - Mission 011 is visible as the first seeded candidate
  - The closeout packet is strong enough to drive the next implementation mission

failureCriteria:
  - Agent RSI implies hidden runtime authority
  - Idle mode can mutate runtime or auto-publish
  - The engine duplicates existing doctrine without adding execution shape
  - No concrete next-run candidate queue exists at closeout
