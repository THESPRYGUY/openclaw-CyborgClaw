objective:
  short: Fix local-memory packaging reproducibility for OpenClaw npm installs.
  detail: >
    Mission 015 closes the seam exposed by Mission 014. The live host now runs
    OpenClaw 2026.4.5, but local memory only works because of manual runtime
    repair. This mission must make npm-installed OpenClaw carry the
    node-llama-cpp local-memory runtime path reproducibly, update operator
    guidance to match that behavior, and add a release guard so the packaging
    contract cannot silently drift again.

scope:
  inScope:
    - npm packaging contract for node-llama-cpp
    - release guardrails for local-memory packaging
    - memory/install/update guidance
    - targeted proof of the packaging seam
  outOfScope:
    - broad memory redesign
    - dreaming feature work
    - Mission 013 control-plane hardening

