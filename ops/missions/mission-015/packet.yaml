instructions:
  leadInstructions:
    - Keep the seam bounded to packaging reproducibility and truthful operator guidance.
    - Do not expand into general memory product work.
    - Leave a clean return path to Mission 013 once this upgrade blocker is removed.
  downstreamInstructions:
    - target: voltaris-v2
      instructions:
        - Keep the operator install/update story honest and supportable.
        - Reject any solution that still depends on hidden repair knowledge.
    - target: codex
      instructions:
        - Ground the fix in the package contract, release guard, and targeted proof.
        - Prefer a minimal reproducibility fix over a large memory refactor.

successCriteria:
  - node-llama-cpp is carried by a reproducible runtime packaging contract
  - release-check fails if the contract drifts
  - operator guidance matches the real install behavior
  - targeted proof lands without relying on host-specific surgery

failureCriteria:
  - local-memory support still depends on hidden manual repair
  - release packaging can regress silently
  - docs continue promising behavior the package does not deliver
